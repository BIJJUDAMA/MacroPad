name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies (Linux only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libxdo-dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: gui/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./ -> target"

      - name: Extract version info
        id: version
        shell: bash
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=$TAG
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)

          echo "tag=$TAG"         >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          if [ "$PATCH" = "0" ] && [ "$MINOR" = "0" ]; then
            echo "release_type=Major Release" >> $GITHUB_OUTPUT
          elif [ "$PATCH" = "0" ]; then
            echo "release_type=Minor Release" >> $GITHUB_OUTPUT
          else
            echo "release_type=Patch Release" >> $GITHUB_OUTPUT
          fi

          if [ "$MAJOR" -eq 0 ] || ([ "$MAJOR" -eq 1 ] && [ "$MINOR" -eq 0 ] && [ "$PATCH" -eq 0 ]); then
             echo "use_readme=true" >> $GITHUB_OUTPUT
          else
             echo "use_readme=false" >> $GITHUB_OUTPUT
          fi

      - name: Extract release notes
        id: notes
        shell: bash
        run: |
          VERSION=${{ steps.version.outputs.version }}
          USE_README=${{ steps.version.outputs.use_readme }}

          if [ "$USE_README" = "true" ]; then
            NOTES=$(awk '/^## ✨ Key Features/{found=1; next} found && /^##/{exit} found{print}' README.md)
            if [ -z "$NOTES" ]; then NOTES="Initial release. Check README."; fi
          else
            NOTES=$(awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
            if [ -z "$NOTES" ]; then NOTES="No changelog entry found."; fi
          fi

          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES"     >> $GITHUB_OUTPUT
          echo "EOF"        >> $GITHUB_OUTPUT

      - name: Install Frontend Dependencies
        working-directory: gui
        run: npm install

      - name: Build Daemon Binary
        run: cargo build -p daemon --release

      - name: Prepare Sidecar
        shell: bash
        run: |
          # Determine the binary extension
          EXT=""
          if [[ "${{ matrix.platform }}" == "windows-latest" ]]; then
            EXT=".exe"
          fi
          
          # Determine host triple
          # Note: We use a simple mapping or just rustc to get the triple
          TRIPLE=$(rustc -vV | grep 'host:' | cut -d' ' -f2)
          echo "Target triple: $TRIPLE"
          
          # Ensure directory exists
          mkdir -p gui/src-tauri
          
          # Copy and rename the binary to the sidecar path
          cp target/release/daemon$EXT gui/src-tauri/daemon-$TRIPLE$EXT
          ls -lh gui/src-tauri/daemon-$TRIPLE$EXT

      - name: Build GUI and Create Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ steps.version.outputs.tag }}
          releaseName: "${{ steps.version.outputs.version }} - ${{ steps.version.outputs.release_type }}"
          releaseBody: |
            ${{ steps.notes.outputs.notes }}

            ---
            Version: ${{ steps.version.outputs.version }}
            Type: ${{ steps.version.outputs.release_type }}
            Full Changelog: https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md
          releaseDraft: false
          prerelease: false
          projectPath: gui
