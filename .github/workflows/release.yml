name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies (Linux only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libxdo-dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: gui/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./ -> target"

      - name: Extract version info
        id: version
        shell: bash
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=$TAG
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)

          echo "tag=$TAG"         >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          if [ "$PATCH" = "0" ] && [ "$MINOR" = "0" ]; then
            echo "release_type=Major Release" >> $GITHUB_OUTPUT
          elif [ "$PATCH" = "0" ]; then
            echo "release_type=Minor Release" >> $GITHUB_OUTPUT
          else
            echo "release_type=Patch Release" >> $GITHUB_OUTPUT
          fi

          # Flag for initial 1.0.0 release — no changelog exists yet
          if [ "$MAJOR" = "1" ] && [ "$MINOR" = "0" ] && [ "$PATCH" = "0" ]; then
            echo "is_initial=true" >> $GITHUB_OUTPUT
          else
            echo "is_initial=false" >> $GITHUB_OUTPUT
          fi

      - name: Extract release notes
        id: notes
        shell: bash
        run: |
          NOTES=$(awk '/^## ✨ Key Features/{found=1; next} found && /^##/{exit} found{print}' "$GITHUB_WORKSPACE/README.md")
          if [ -z "$NOTES" ]; then NOTES="See README for details."; fi

          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES"     >> $GITHUB_OUTPUT
          echo "EOF"        >> $GITHUB_OUTPUT

      - name: Install Frontend Dependencies
        working-directory: gui
        run: npm install

      - name: Build Daemon Binary
        run: cargo build -p daemon --release

      - name: Prepare Sidecar
        shell: bash
        run: |
          EXT=""
          if [[ "${{ matrix.platform }}" == "windows-latest" ]]; then
            EXT=".exe"
          fi

          TRIPLE=$(rustc -vV | grep 'host:' | cut -d' ' -f2)
          echo "Target triple: $TRIPLE"

          mkdir -p gui/src-tauri
          cp target/release/daemon$EXT gui/src-tauri/daemon-$TRIPLE$EXT
          ls -lh gui/src-tauri/daemon-$TRIPLE$EXT

      - name: Build GUI and Create Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ steps.version.outputs.tag }}
          releaseName: "${{ steps.version.outputs.version }} - ${{ steps.version.outputs.release_type }}"
          releaseBody: |
            ${{ steps.notes.outputs.notes }}

            ---
            Version: ${{ steps.version.outputs.version }}
            Type: ${{ steps.version.outputs.release_type }}
            README: https://github.com/${{ github.repository }}/blob/main/README.md
            Docs: https://github.com/${{ github.repository }}/tree/main/docs
            ${{ steps.version.outputs.is_initial == 'false' && format('Full Changelog: https://github.com/{0}/blob/main/CHANGELOG.md', github.repository) || '' }}
          releaseDraft: false
          prerelease: false
          projectPath: gui

  update-readme:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Extract tag
        id: tag
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Update banner version
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          sed -i "s|BUILD <tspan fill=\"#E8561A\">v[0-9]*\.[0-9]*\.[0-9]*</tspan>|BUILD <tspan fill=\"#E8561A\">v${VERSION}</tspan>|g" docs/assets/banner.svg

      - name: Replace logo in README
        run: |
          python3 -c "
          import re, pathlib
          readme = pathlib.Path('README.md').read_text()
          new_img = '<img src=\"docs/assets/banner.svg\" width=\"100%\" alt=\"Macropad Banner\">'
          readme = re.sub(r'<img\s[^>]*docs/assets/logo_light\.png[^>]*>', new_img, readme)
          pathlib.Path('README.md').write_text(readme)
          "

      - name: Commit and push
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git add docs/assets/banner.svg README.md
          git diff --staged --quiet || git commit -m "style: update release banner to v${{ steps.tag.outputs.version }}"
          git push origin main
