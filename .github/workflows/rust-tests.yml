name: Rust Tests

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fmt:
    name: Auto Format
    runs-on: ubuntu-latest
    if: |
      !contains(github.event.head_commit.message, 'style: apply cargo fmt') &&
      !contains(github.event.head_commit.message, '[skip rust]') &&
      !contains(github.event.head_commit.message, '[skip tests]') &&
      !contains(github.event.pull_request.title, '[skip rust]') &&
      !contains(github.event.pull_request.title, '[skip tests]')
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.head_ref || github.ref_name }}

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt

    - name: Run cargo fmt
      run: cargo fmt --all

    - name: Commit and push changes
      run: |
        if [[ -n $(git status --porcelain) ]]; then
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"
          git add .
          git commit -m "style: apply cargo fmt across workspace with me as the author"
          git push
        else
          echo "No changes to commit"
        fi

  test:
    name: Run Tests
    needs: fmt
    if: |
      always() && !failure() && !cancelled() &&
      !contains(github.event.head_commit.message, '[skip rust]') &&
      !contains(github.event.head_commit.message, '[skip tests]') &&
      !contains(github.event.pull_request.title, '[skip rust]') &&
      !contains(github.event.pull_request.title, '[skip tests]')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - uses: actions/checkout@v4
    
    - name: Install System Dependencies (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libxdo-dev

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy, rustfmt

    - name: Rust Cache
      uses: Swatinem/rust-cache@v2

    - name: Create Dummy GUI Dist
      run: mkdir -p gui/dist

    - name: Build Sidecar (Windows)
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: ./scripts/build-sidecar.ps1

    - name: Build Sidecar (Unix)
      if: matrix.os != 'windows-latest'
      run: chmod +x ./scripts/build-sidecar.sh && ./scripts/build-sidecar.sh

    - name: Check formatting
      run: cargo fmt --all -- --check

    - name: Clippy
      run: cargo clippy --workspace -- -D warnings

    - name: Run all tests
      run: cargo test --workspace
